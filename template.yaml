AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Routvi Backend — Ecosistema de descubrimiento gastronómico.
  Stack serverless con AWS SAM + Node.js 20.x + Cognito + DynamoDB

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: nodejs20.x

Resources:

  # ════════════════════════════════════════════════════════════════════
  # SHARED INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════════════

  # ── Cognito: User Pool (authentication store) ─────────────────────
  RoutviUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: routvi-user-pool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: rol
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: false
          RequireNumbers: true
          RequireSymbols: true

  # ── Cognito: User Pool Client (app credentials) ──────────────────
  RoutviUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: routvi-backend-client
      UserPoolId: !Ref RoutviUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ── API Gateway (shared across all modules) ────────────────────────
  RoutviApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        Authorizers:
          RoutviCognitoAuthorizer:
            UserPoolArn: !GetAtt RoutviUserPool.Arn

  # ── DynamoDB: Business profiles table ──────────────────────────────
  BusinessProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BusinessProfiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # ── DynamoDB: Menu categories table (businessId PK + categoryId SK) ──
  MenuCategoriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MenuCategories
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: businessId
          AttributeType: S
        - AttributeName: categoryId
          AttributeType: S
      KeySchema:
        - AttributeName: businessId
          KeyType: HASH
        - AttributeName: categoryId
          KeyType: RANGE

  # ── S3: Media bucket (images — gallery, banners, logos) ─────────────
  RoutviMediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'routvi-media-${AWS::AccountId}-${AWS::Region}'
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT]
            AllowedOrigins: ['*']
            MaxAge: 3000

  # ════════════════════════════════════════════════════════════════════
  # MODULE: AUTH  (/v1/auth/*)
  # ════════════════════════════════════════════════════════════════════

  # ── Auth: User registration ─────────────────────────────────────────
  AuthRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/register/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_ID: !Ref RoutviUserPool
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:SignUp
                - cognito-idp:AdminConfirmSignUp
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt RoutviUserPool.Arn
      Events:
        RegisterApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/register
            Method: post

  # ── Auth: User login ────────────────────────────────────────────────
  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/login/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        LoginApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/login
            Method: post

  # ── Auth: Token refresh ─────────────────────────────────────────────
  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/refresh/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        RefreshApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/refresh
            Method: post

  # ── Auth: Password reset (sends verification code) ─────────────────
  AuthResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/reset-password/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        ResetPasswordApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/reset-password
            Method: post

  # ── Auth: PIN / code verification ──────────────────────────────────
  AuthVerifyCodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/verify-code/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        VerifyCodeApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/verify-code
            Method: post

  # ── Auth: Current authenticated user (protected) ───────────────────
  AuthMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/me/
      Handler: app.handler
      Architectures:
        - x86_64
      Events:
        MeApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/me
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ════════════════════════════════════════════════════════════════════
  # MODULE: BUSINESS  (/v1/business/*)
  # ════════════════════════════════════════════════════════════════════

  # ── Business: GET business profile ─────────────────────────────────
  BusinessProfileGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/profile-configuration/profile/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUSINESS_PROFILES_TABLE: !Ref BusinessProfilesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt BusinessProfilesTable.Arn
      Events:
        BusinessProfileGetApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/business/profile
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Business: PUT business profile (create or update) ───────────────
  BusinessProfileUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/profile-configuration/profile-update/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUSINESS_PROFILES_TABLE: !Ref BusinessProfilesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt BusinessProfilesTable.Arn
      Events:
        BusinessProfileUpdateApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/business/profile
            Method: put
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Business: POST publish (change status to published + SSG webhook) ─
  BusinessPublishFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/profile-configuration/publish/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUSINESS_PROFILES_TABLE: !Ref BusinessProfilesTable
          WEBHOOK_URL: ''
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt BusinessProfilesTable.Arn
      Events:
        BusinessPublishApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/business/publish
            Method: post
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Media: POST generate S3 presigned upload URL ────────────────────
  MediaUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/media-s3/upload-url/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MEDIA_BUCKET_NAME: !Ref RoutviMediaBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub '${RoutviMediaBucket.Arn}/*'
      Events:
        MediaUploadUrlApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/media/upload-url
            Method: post
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Media: DELETE remove image from S3 bucket ───────────────────────
  MediaDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/media-s3/delete/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MEDIA_BUCKET_NAME: !Ref RoutviMediaBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub '${RoutviMediaBucket.Arn}/*'
      Events:
        MediaDeleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/media
            Method: delete
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ════════════════════════════════════════════════════════════════════
  # MODULE: MENU CATEGORIES  (/v1/menu/categories)
  # ════════════════════════════════════════════════════════════════════

  # ── Menu: POST create a new category ────────────────────────────────
  MenuCategoriesCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-categories/categories-create/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_CATEGORIES_TABLE: !Ref MenuCategoriesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource: !GetAtt MenuCategoriesTable.Arn
      Events:
        MenuCategoriesCreateApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/categories
            Method: post
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: GET list all categories (sorted by order) ─────────────────
  MenuCategoriesListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-categories/categories-list/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_CATEGORIES_TABLE: !Ref MenuCategoriesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt MenuCategoriesTable.Arn
      Events:
        MenuCategoriesListApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/categories
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

Outputs:
  ApiBaseUrl:
    Description: URL base de la API de Routvi
    Value: !Sub 'https://${RoutviApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'

  UserPoolId:
    Description: ID del Cognito User Pool
    Value: !Ref RoutviUserPool

  UserPoolClientId:
    Description: ID del Cognito User Pool Client
    Value: !Ref RoutviUserPoolClient

  BusinessProfilesTableName:
    Description: Nombre de la tabla DynamoDB de perfiles
    Value: !Ref BusinessProfilesTable
