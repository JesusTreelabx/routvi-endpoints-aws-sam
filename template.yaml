AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Routvi Backend — Ecosistema de descubrimiento gastronómico.
  Stack serverless con AWS SAM + Node.js 20.x + Cognito + DynamoDB

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: nodejs20.x

Resources:

  # ════════════════════════════════════════════════════════════════════
  # SHARED INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════════════

  # ── Cognito: User Pool (authentication store) ─────────────────────
  RoutviUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: routvi-user-pool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: rol
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: false
          RequireNumbers: true
          RequireSymbols: true

  # ── Cognito: User Pool Client (app credentials) ──────────────────
  RoutviUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: routvi-backend-client
      UserPoolId: !Ref RoutviUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ── API Gateway (shared across all modules) ────────────────────────
  RoutviApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        Authorizers:
          RoutviCognitoAuthorizer:
            UserPoolArn: !GetAtt RoutviUserPool.Arn

  # ── DynamoDB: Business profiles table ──────────────────────────────
  BusinessProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BusinessProfiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # ════════════════════════════════════════════════════════════════════
  # MODULE: AUTH  (/v1/auth/*)
  # ════════════════════════════════════════════════════════════════════

  # ── Auth: User registration ─────────────────────────────────────────
  AuthRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/register/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_ID: !Ref RoutviUserPool
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:SignUp
                - cognito-idp:AdminConfirmSignUp
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt RoutviUserPool.Arn
      Events:
        RegisterApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/register
            Method: post

  # ── Auth: User login ────────────────────────────────────────────────
  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/login/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        LoginApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/login
            Method: post

  # ── Auth: Token refresh ─────────────────────────────────────────────
  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/refresh/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        RefreshApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/refresh
            Method: post

  # ── Auth: Password reset (sends verification code) ─────────────────
  AuthResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/reset-password/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        ResetPasswordApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/reset-password
            Method: post

  # ── Auth: PIN / code verification ──────────────────────────────────
  AuthVerifyCodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/verify-code/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        VerifyCodeApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/verify-code
            Method: post

  # ── Auth: Current authenticated user (protected) ───────────────────
  AuthMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/me/
      Handler: app.handler
      Architectures:
        - x86_64
      Events:
        MeApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/me
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ════════════════════════════════════════════════════════════════════
  # MODULE: BUSINESS  (/v1/business/*)
  # ════════════════════════════════════════════════════════════════════

  # ── Business: GET business profile ─────────────────────────────────
  BusinessProfileGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/perfil-configuracion/profile/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUSINESS_PROFILES_TABLE: !Ref BusinessProfilesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt BusinessProfilesTable.Arn
      Events:
        BusinessProfileGetApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/business/profile
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Business: PUT business profile (create or update) ───────────────
  BusinessProfileUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/perfil-configuracion/profile-update/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUSINESS_PROFILES_TABLE: !Ref BusinessProfilesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt BusinessProfilesTable.Arn
      Events:
        BusinessProfileUpdateApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/business/profile
            Method: put
            Auth:
              Authorizer: RoutviCognitoAuthorizer

Outputs:
  ApiBaseUrl:
    Description: URL base de la API de Routvi
    Value: !Sub 'https://${RoutviApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'

  UserPoolId:
    Description: ID del Cognito User Pool
    Value: !Ref RoutviUserPool

  UserPoolClientId:
    Description: ID del Cognito User Pool Client
    Value: !Ref RoutviUserPoolClient

  BusinessProfilesTableName:
    Description: Nombre de la tabla DynamoDB de perfiles
    Value: !Ref BusinessProfilesTable
