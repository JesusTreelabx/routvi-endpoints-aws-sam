AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Routvi Backend — Ecosistema de descubrimiento gastronómico.
  Stack serverless con AWS SAM + Node.js 20.x + Cognito + DynamoDB

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: nodejs20.x

Resources:

  # ════════════════════════════════════════════════════════════════════
  # SHARED INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════════════

  # ── Cognito: User Pool (authentication store) ─────────────────────
  RoutviUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: routvi-user-pool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: rol
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: false
          RequireNumbers: true
          RequireSymbols: true

  # ── Cognito: User Pool Client (app credentials) ──────────────────
  RoutviUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: routvi-backend-client
      UserPoolId: !Ref RoutviUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ── API Gateway (shared across all modules) ────────────────────────
  RoutviApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        Authorizers:
          RoutviCognitoAuthorizer:
            UserPoolArn: !GetAtt RoutviUserPool.Arn

  # ── DynamoDB: Business profiles table ──────────────────────────────
  BusinessProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BusinessProfiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: slug-index
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── DynamoDB: Menu categories table (businessId PK + categoryId SK) ──
  MenuCategoriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MenuCategories
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: businessId
          AttributeType: S
        - AttributeName: categoryId
          AttributeType: S
      KeySchema:
        - AttributeName: businessId
          KeyType: HASH
        - AttributeName: categoryId
          KeyType: RANGE

  # ── DynamoDB: Menu products table (businessId PK + productId SK) ─────
  MenuProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MenuProducts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: businessId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: businessId
          KeyType: HASH
        - AttributeName: productId
          KeyType: RANGE

  # ── DynamoDB: Promotions table (businessId PK + promotionId SK) ──────
  PromotionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Promotions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: businessId
          AttributeType: S
        - AttributeName: promotionId
          AttributeType: S
      KeySchema:
        - AttributeName: businessId
          KeyType: HASH
        - AttributeName: promotionId
          KeyType: RANGE

  # ── DynamoDB: Social posts table (businessId PK + postId SK) ─────────
  SocialPostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SocialPosts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: businessId
          AttributeType: S
        - AttributeName: postId
          AttributeType: S
      KeySchema:
        - AttributeName: businessId
          KeyType: HASH
        - AttributeName: postId
          KeyType: RANGE

  # ── DynamoDB: Public suggestions table (suggestionId PK) ─────────────
  SuggestionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Suggestions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: suggestionId
          AttributeType: S
      KeySchema:
        - AttributeName: suggestionId
          KeyType: HASH

  # ── DynamoDB: Public corrections table (correctionId PK) ─────────────
  CorrectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Corrections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: correctionId
          AttributeType: S
      KeySchema:
        - AttributeName: correctionId
          KeyType: HASH

  # ── DynamoDB: User Favorites table (userId PK + favoriteId SK) ───────
  FavoritesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Favorites
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: favoriteId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: favoriteId
          KeyType: RANGE

  # ── S3: Media bucket (images — gallery, banners, logos) ─────────────
  RoutviMediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'routvi-media-${AWS::AccountId}-${AWS::Region}'
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT]
            AllowedOrigins: ['*']
            MaxAge: 3000

  # ════════════════════════════════════════════════════════════════════
  # MODULE: AUTH  (/v1/auth/*)
  # ════════════════════════════════════════════════════════════════════

  # ── Auth: User registration ─────────────────────────────────────────
  AuthRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/register/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_ID: !Ref RoutviUserPool
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:SignUp
                - cognito-idp:AdminConfirmSignUp
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt RoutviUserPool.Arn
      Events:
        RegisterApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/register
            Method: post

  # ── Auth: User login ────────────────────────────────────────────────
  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/login/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        LoginApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/login
            Method: post

  # ── Auth: Token refresh ─────────────────────────────────────────────
  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/refresh/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        RefreshApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/refresh
            Method: post

  # ── Auth: Password reset (sends verification code) ─────────────────
  AuthResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/reset-password/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        ResetPasswordApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/reset-password
            Method: post

  # ── Auth: PIN / code verification ──────────────────────────────────
  AuthVerifyCodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/verify-code/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref RoutviUserPoolClient
      Events:
        VerifyCodeApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/verify-code
            Method: post

  # ── Auth: Current authenticated user (protected) ───────────────────
  AuthMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/auth/me/
      Handler: app.handler
      Architectures:
        - x86_64
      Events:
        MeApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/auth/me
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ════════════════════════════════════════════════════════════════════
  # MODULE: BUSINESS  (/v1/business/*)
  # ════════════════════════════════════════════════════════════════════

  # ── Business: GET business profile ─────────────────────────────────
  BusinessProfileGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/profile-configuration/profile/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUSINESS_PROFILES_TABLE: !Ref BusinessProfilesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt BusinessProfilesTable.Arn
      Events:
        BusinessProfileGetApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/business/profile
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Business: PUT business profile (create or update) ───────────────
  BusinessProfileUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/profile-configuration/profile-update/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUSINESS_PROFILES_TABLE: !Ref BusinessProfilesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt BusinessProfilesTable.Arn
      Events:
        BusinessProfileUpdateApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/business/profile
            Method: put
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Business: POST publish (change status to published + SSG webhook) ─
  BusinessPublishFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/profile-configuration/publish/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUSINESS_PROFILES_TABLE: !Ref BusinessProfilesTable
          WEBHOOK_URL: ''
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt BusinessProfilesTable.Arn
      Events:
        BusinessPublishApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/business/publish
            Method: post
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Media: POST generate S3 presigned upload URL ────────────────────
  MediaUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/media-s3/upload-url/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MEDIA_BUCKET_NAME: !Ref RoutviMediaBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub '${RoutviMediaBucket.Arn}/*'
      Events:
        MediaUploadUrlApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/media/upload-url
            Method: post
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Media: DELETE remove image from S3 bucket ───────────────────────
  MediaDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/media-s3/delete/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MEDIA_BUCKET_NAME: !Ref RoutviMediaBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub '${RoutviMediaBucket.Arn}/*'
      Events:
        MediaDeleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/media
            Method: delete
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ════════════════════════════════════════════════════════════════════
  # MODULE: MENU CATEGORIES  (/v1/menu/categories)
  # ════════════════════════════════════════════════════════════════════

  # ── Menu: POST create a new category ────────────────────────────────
  MenuCategoriesCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-categories/categories-create/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_CATEGORIES_TABLE: !Ref MenuCategoriesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource: !GetAtt MenuCategoriesTable.Arn
      Events:
        MenuCategoriesCreateApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/categories
            Method: post
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: GET list all categories (sorted by order) ─────────────────
  MenuCategoriesListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-categories/categories-list/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_CATEGORIES_TABLE: !Ref MenuCategoriesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt MenuCategoriesTable.Arn
      Events:
        MenuCategoriesListApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/categories
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: GET single category by categoryId ─────────────────────────
  MenuCategoriesGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-categories/categories-get/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_CATEGORIES_TABLE: !Ref MenuCategoriesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt MenuCategoriesTable.Arn
      Events:
        MenuCategoriesGetApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/categories/{categoryId}
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: PUT update category by categoryId ──────────────────────────
  MenuCategoriesUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-categories/categories-update/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_CATEGORIES_TABLE: !Ref MenuCategoriesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt MenuCategoriesTable.Arn
      Events:
        MenuCategoriesUpdateApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/categories/{categoryId}
            Method: put
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: DELETE category by categoryId ─────────────────────────────
  MenuCategoriesDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-categories/categories-delete/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_CATEGORIES_TABLE: !Ref MenuCategoriesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:DeleteItem
              Resource: !GetAtt MenuCategoriesTable.Arn
      Events:
        MenuCategoriesDeleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/categories/{categoryId}
            Method: delete
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ════════════════════════════════════════════════════════════════════
  # MODULE: MENU PRODUCTS  (/v1/menu/products)
  # ════════════════════════════════════════════════════════════════════

  # ── Menu: POST create a new product ─────────────────────────────────
  MenuProductsCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-products/products-create/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_PRODUCTS_TABLE: !Ref MenuProductsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource: !GetAtt MenuProductsTable.Arn
      Events:
        MenuProductsCreateApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/products
            Method: post
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: GET list all products (optional ?categoryId filter) ────────
  MenuProductsListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-products/products-list/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_PRODUCTS_TABLE: !Ref MenuProductsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt MenuProductsTable.Arn
      Events:
        MenuProductsListApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/products
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: GET single product by productId ───────────────────────────
  MenuProductsGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-products/products-get/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_PRODUCTS_TABLE: !Ref MenuProductsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt MenuProductsTable.Arn
      Events:
        MenuProductsGetApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/products/{productId}
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: PUT update product by productId ────────────────────────────
  MenuProductsUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-products/products-update/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_PRODUCTS_TABLE: !Ref MenuProductsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt MenuProductsTable.Arn
      Events:
        MenuProductsUpdateApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/products/{productId}
            Method: put
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: DELETE product by productId ───────────────────────────────
  MenuProductsDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-products/products-delete/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_PRODUCTS_TABLE: !Ref MenuProductsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:DeleteItem
              Resource: !GetAtt MenuProductsTable.Arn
      Events:
        MenuProductsDeleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/products/{productId}
            Method: delete
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: PATCH toggle product availability (1-click sold out) ───────
  MenuProductsAvailabilityFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-products/products-availability/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_PRODUCTS_TABLE: !Ref MenuProductsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt MenuProductsTable.Arn
      Events:
        MenuProductsAvailabilityApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/products/{productId}/availability
            Method: patch
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Menu: PUT reorder products (drag & drop) ─────────────────────────
  MenuProductsReorderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/menu-products/products-reorder/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_PRODUCTS_TABLE: !Ref MenuProductsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt MenuProductsTable.Arn
      Events:
        MenuProductsReorderApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/menu/products/reorder
            Method: put
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ════════════════════════════════════════════════════════════════════
  # MODULE: DAILY SPECIAL  (/v1/daily-special)
  # ════════════════════════════════════════════════════════════════════

  # ── Daily Special: POST set daily special + snapshot ────────────────
  DailySpecialSetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/daily-special/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          MENU_PRODUCTS_TABLE: !Ref MenuProductsTable
          BUSINESS_PROFILES_TABLE: !Ref BusinessProfilesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt MenuProductsTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt BusinessProfilesTable.Arn
      Events:
        DailySpecialSetApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/daily-special/set
            Method: post
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ════════════════════════════════════════════════════════════════════
  # MODULE: PROMOTIONS  (/v1/promotions)
  # ════════════════════════════════════════════════════════════════════

  # ── Promotions: POST create a new promotion ──────────────────────────
  PromotionsCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/promotions/promotions-create/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          PROMOTIONS_TABLE: !Ref PromotionsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt PromotionsTable.Arn
      Events:
        PromotionsCreateApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
            Path: /v1/promotions
            Method: post
            Auth:
              Authorizer: RoutviCognitoAuthorizer

  # ── Promotions: GET list all promotions (optional ?active filter) ─────
  PromotionsListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/business/promotions/promotions-list/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          PROMOTIONS_TABLE: !Ref PromotionsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt PromotionsTable.Arn
      Events:
        PromotionsListApi:
          Type: Api
          Properties:
            RestApiId: !Ref RoutviApi
