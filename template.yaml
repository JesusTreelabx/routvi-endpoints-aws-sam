AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Routvi Backend — Ecosistema de descubrimiento gastronómico.
  Stack raíz: orquesta los sub-stacks de Auth, Business y recursos compartidos.

Resources:

  # ── Cognito: User Pool ──────────────────────────────────────────────
  RoutviUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: routvi-user-pool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: rol
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: false
          RequireNumbers: true
          RequireSymbols: true

  # ── Cognito: User Pool Client ───────────────────────────────────────
  RoutviUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: routvi-backend-client
      UserPoolId: !Ref RoutviUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ── API Gateway (compartida entre todos los sub-stacks) ─────────────
  RoutviApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        Authorizers:
          RoutviCognitoAuthorizer:
            UserPoolArn: !GetAtt RoutviUserPool.Arn

  # ── Sub-stack: Auth ─────────────────────────────────────────────────
  AuthStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./templates/auth.yaml
      Parameters:
        UserPoolId:       !Ref RoutviUserPool
        UserPoolClientId: !Ref RoutviUserPoolClient
        UserPoolArn:      !GetAtt RoutviUserPool.Arn
        ApiId:            !Ref RoutviApi

  # ── DynamoDB: Perfiles de negocios ──────────────────────────────────
  BusinessProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BusinessProfiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # ── Sub-stack: Business ─────────────────────────────────────────────
  BusinessStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./templates/business.yaml
      Parameters:
        ApiId: !Ref RoutviApi
        BusinessProfilesTable: !Ref BusinessProfilesTable

Outputs:
  ApiBaseUrl:
    Description: URL base de la API de Routvi
    Value: !Sub 'https://${RoutviApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'

  UserPoolId:
    Description: ID del Cognito User Pool
    Value: !Ref RoutviUserPool

  UserPoolClientId:
    Description: ID del Cognito User Pool Client
    Value: !Ref RoutviUserPoolClient
