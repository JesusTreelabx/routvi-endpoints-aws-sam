AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Routvi Backend \u2014 Ecosistema de descubrimiento gastron\xF3mico.\
  \ Stack serverless con AWS SAM + Node.js 20.x\n"
Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: nodejs20.x
Resources:
  AuthRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: AuthRegisterFunction
      Handler: app.handler
      Runtime: nodejs20.x
      Architectures:
      - x86_64
      Events:
        RegisterApi:
          Type: Api
          Properties:
            Path: /v1/auth/register
            Method: post
    Metadata:
      SamResourceId: AuthRegisterFunction
Outputs:
  RegisterApiUrl:
    Description: URL del endpoint de registro
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/v1/auth/register
  AuthRegisterFunctionArn:
    Description: "ARN de la funci\xF3n Lambda de registro"
    Value:
      Fn::GetAtt:
      - AuthRegisterFunction
      - Arn
