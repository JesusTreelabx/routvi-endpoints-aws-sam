AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Routvi — Business Console Lambdas (profile, menu, promotions, social)

Parameters:
  ApiId:
    Type: String
  BusinessProfilesTable:
    Type: String

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: nodejs20.x

Resources:

  # ── Business: GET perfil del negocio ───────────────────────────────
  BusinessProfileGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/business/perfil-configuracion/profile/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUSINESS_PROFILES_TABLE: !Ref BusinessProfilesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${BusinessProfilesTable}'
      Events:
        BusinessProfileGetApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiId
            Path: /v1/business/profile
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer
