AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Routvi — Auth Lambdas (register, login, refresh, reset-password, verify-code, me)

Parameters:
  UserPoolId:
    Type: String
  UserPoolClientId:
    Type: String
  UserPoolArn:
    Type: String
  ApiId:
    Type: String

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: nodejs20.x

Resources:

  # ── Auth: Registro de usuarios ──────────────────────────────────────
  AuthRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/auth/register/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:SignUp
                - cognito-idp:AdminConfirmSignUp
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !Ref UserPoolArn
      Events:
        RegisterApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiId
            Path: /v1/auth/register
            Method: post

  # ── Auth: Login de usuarios ────────────────────────────────────────
  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/auth/login/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
      Events:
        LoginApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiId
            Path: /v1/auth/login
            Method: post

  # ── Auth: Refresh de tokens ────────────────────────────────────────
  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/auth/refresh/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
      Events:
        RefreshApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiId
            Path: /v1/auth/refresh
            Method: post

  # ── Auth: Reset de contraseña ──────────────────────────────────────
  AuthResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/auth/reset-password/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
      Events:
        ResetPasswordApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiId
            Path: /v1/auth/reset-password
            Method: post

  # ── Auth: Verificación de código/PIN ──────────────────────────────
  AuthVerifyCodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/auth/verify-code/
      Handler: app.handler
      Architectures:
        - x86_64
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
      Events:
        VerifyCodeApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiId
            Path: /v1/auth/verify-code
            Method: post

  # ── Auth: Usuario actual (protegido con Cognito JWT) ───────────────
  AuthMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/auth/me/
      Handler: app.handler
      Architectures:
        - x86_64
      Events:
        MeApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiId
            Path: /v1/auth/me
            Method: get
            Auth:
              Authorizer: RoutviCognitoAuthorizer
